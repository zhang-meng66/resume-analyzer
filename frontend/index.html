<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 简历分析系统</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 32px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 44px 48px;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            padding: 2px 12px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .header .badge {
            background: var(--bg);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-bottom: 28px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-bar .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-bar .dot.green { background: #22c55e; }
        .status-bar .dot.red { background: #ef4444; }

        /* ===== 选项卡 ===== */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: var(--radius-sm);
            margin-bottom: 28px;
        }

        .tabs button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .tabs button.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .tabs button:hover:not(.active) {
            color: var(--text);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 表单 ===== */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 48px 24px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            background: #fafbfc;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: #f8faff;
        }
        .upload-area.dragover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .upload-area .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        .upload-area .file-name {
            color: var(--primary);
            font-weight: 500;
            margin-top: 6px;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .form-group {
            margin-top: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: var(--transition);
            background: #fafbfc;
        }
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: #fff;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            box-shadow: none;
        }

        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* ===== 结果卡片 ===== */
        .result-box {
            margin-top: 28px;
            border-top: 2px solid var(--border);
            padding-top: 24px;
        }

        .result-box .cache-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 500;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-card {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
        }
        .info-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .info-card .item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .info-card .item:last-child {
            border-bottom: none;
        }
        .info-card .item .label {
            color: var(--text-secondary);
        }
        .info-card .item .value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .project-item {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        .project-item strong {
            display: block;
            margin-bottom: 2px;
            color: var(--text);
        }

        .skill-tag {
            display: inline-block;
            background: #e0e7ff;
            color: #3730a3;
            font-size: 12px;
            font-weight: 500;
            padding: 2px 12px;
            border-radius: 20px;
            margin: 2px 4px 2px 0;
        }

        /* ===== 匹配度大卡片 ===== */
        .match-hero {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 24px 28px;
            margin-bottom: 20px;
        }

        .match-hero .score-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .match-hero .score-detail {
            flex: 1;
        }
        .match-hero .score-detail .row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 3px 0;
        }
        .match-hero .score-detail .row .bar {
            flex: 1;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 0 14px;
            align-self: center;
            overflow: hidden;
        }
        .match-hero .score-detail .row .bar .fill {
            height: 100%;
            border-radius: 4px;
            background: var(--primary);
            transition: width 0.6s ease;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            background: #1e293b;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s ease;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.success {
            background: #16a34a;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .container { padding: 20px 16px; }
            .grid-2 { grid-template-columns: 1fr; }
            .header h1 { font-size: 20px; }
            .match-hero { flex-direction: column; align-items: flex-start; gap: 16px; }
            .match-hero .score-circle { width: 70px; height: 70px; font-size: 26px; }
            .tabs button { font-size: 13px; padding: 8px 10px; }
        }

        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .text-center { text-align: center; }
        .text-secondary { color: var(--text-secondary); font-size: 14px; }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- ===== 头部 ===== -->
    <div class="header">
        <h1>📄 AI 简历分析 </h1>
        <span class="badge">🚀 FastAPI + 纯静态前端版本</span>
    </div>

    <!-- ===== 状态栏 ===== -->
    <div class="status-bar">
        <span>
            <span class="dot green" id="statusDot"></span>
            <span id="statusText">后端检测中...</span>
        </span>
        <span id="cacheInfo">缓存: 0 条</span>
    </div>

    <!-- ===== 选项卡 ===== -->
    <div class="tabs">
        <button class="active" data-tab="tab-parse">📤 简历解析</button>
        <button data-tab="tab-match">🎯 岗位匹配</button>
    </div>

    <!-- ===== TAB 1: 解析 ===== -->
    <div class="tab-content active" id="tab-parse">

        <div class="upload-area" id="dropZone">
            <span class="icon">📎</span>
            <p>点击上传 或 拖拽 PDF 到此处</p>
            <div class="file-name" id="fileName">未选择文件</div>
        </div>
        <input type="file" id="fileInput" accept=".pdf" />

        <div class="action-row">
            <button class="btn" id="parseBtn">🚀 开始解析</button>
            <button class="btn btn-secondary" id="clearBtn">清空结果</button>
        </div>

        <div id="parseResult" class="result-box" style="display:none;"></div>
    </div>

    <!-- ===== TAB 2: 匹配 ===== -->
    <div class="tab-content" id="tab-match">

        <div class="upload-area" id="dropZoneMatch">
            <span class="icon">📎</span>
            <p>点击上传 或 拖拽 PDF 到此处</p>
            <div class="file-name" id="fileNameMatch">未选择文件</div>
        </div>
        <input type="file" id="fileInputMatch" accept=".pdf" />

        <div class="form-group">
            <label for="jdInput">📋 岗位描述</label>
            <textarea id="jdInput" placeholder="例如：招聘 Java 后端开发工程师，熟悉 Spring Boot、MySQL、Redis..."></textarea>
        </div>

        <div class="action-row">
            <button class="btn" id="matchBtn">📊 计算匹配度</button>
            <button class="btn btn-secondary" id="clearMatchBtn">清空结果</button>
        </div>

        <div id="matchResult" class="result-box" style="display:none;"></div>
    </div>

</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
    // ============================================================
    //  配置
    // ============================================================
    const API_BASE = 'http://localhost:8000';

    // ============================================================
    //  DOM 引用
    // ============================================================
    const $ = id => document.getElementById(id);
    const fileInput = $('fileInput');
    const fileInputMatch = $('fileInputMatch');
    const dropZone = $('dropZone');
    const dropZoneMatch = $('dropZoneMatch');
    const fileName = $('fileName');
    const fileNameMatch = $('fileNameMatch');
    const parseBtn = $('parseBtn');
    const matchBtn = $('matchBtn');
    const jdInput = $('jdInput');
    const parseResult = $('parseResult');
    const matchResult = $('matchResult');
    const statusText = $('statusText');
    const statusDot = $('statusDot');
    const cacheInfo = $('cacheInfo');
    const toast = $('toast');

    // 当前选中的文件
    let currentFile = null;
    let currentFileMatch = null;

    // ============================================================
    //  Toast
    // ============================================================
    let toastTimer = null;

    function showToast(msg, type = '') {
        toast.textContent = msg;
        toast.className = 'toast show ' + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    // ============================================================
    //  选项卡切换
    // ============================================================
    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    // ============================================================
    //  文件上传 UI（两个区域共用逻辑）
    // ============================================================
    function setupDropZone(zone, input, fileNameEl, fileRef, isMatch) {
        zone.addEventListener('click', () => input.click());

        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                const f = e.dataTransfer.files[0];
                if (f.type === 'application/pdf' || f.name.endsWith('.pdf')) {
                    if (isMatch) {
                        currentFileMatch = f;
                        fileNameMatch.textContent = '✅ ' + f.name;
                    } else {
                        currentFile = f;
                        fileName.textContent = '✅ ' + f.name;
                    }
                    // 同步到 input
                    const dt = new DataTransfer();
                    dt.items.add(f);
                    input.files = dt.files;
                } else {
                    showToast('请上传 PDF 文件', 'error');
                }
            }
        });

        input.addEventListener('change', function() {
            if (this.files.length) {
                const f = this.files[0];
                if (isMatch) {
                    currentFileMatch = f;
                    fileNameMatch.textContent = '✅ ' + f.name;
                } else {
                    currentFile = f;
                    fileName.textContent = '✅ ' + f.name;
                }
            }
        });
    }

    setupDropZone(dropZone, fileInput, fileName, currentFile, false);
    setupDropZone(dropZoneMatch, fileInputMatch, fileNameMatch, currentFileMatch, true);

    // ============================================================
    //  后端健康检查 + 缓存状态
    // ============================================================
    async function checkHealth() {
        try {
            const res = await fetch(`${API_BASE}/health`);
            if (res.ok) {
                statusDot.className = 'dot green';
                statusText.textContent = '后端运行中 ✅';
                // 获取缓存状态
                try {
                    const cacheRes = await fetch(`${API_BASE}/cache/status`);
                    if (cacheRes.ok) {
                        const data = await cacheRes.json();
                        cacheInfo.textContent = `缓存: ${data.cache_size || 0} 条`;
                    }
                } catch (_) {}
            } else {
                statusDot.className = 'dot red';
                statusText.textContent = '后端异常 ⚠️';
            }
        } catch (_) {
            statusDot.className = 'dot red';
            statusText.textContent = '后端未启动 ❌ (请运行 uvicorn main:app --reload)';
            cacheInfo.textContent = '缓存: --';
        }
    }
    checkHealth();
    setInterval(checkHealth, 8000);

    // ============================================================
    //  清空结果
    // ============================================================
    $('clearBtn').addEventListener('click', () => {
        parseResult.style.display = 'none';
        parseResult.innerHTML = '';
        currentFile = null;
        fileName.textContent = '未选择文件';
        fileInput.value = '';
    });
    $('clearMatchBtn').addEventListener('click', () => {
        matchResult.style.display = 'none';
        matchResult.innerHTML = '';
        currentFileMatch = null;
        fileNameMatch.textContent = '未选择文件';
        fileInputMatch.value = '';
        jdInput.value = '';
    });

    // ============================================================
    //  API 调用：解析
    // ============================================================
    parseBtn.addEventListener('click', async () => {
        if (!currentFile) {
            showToast('请先选择 PDF 简历', 'error');
            return;
        }

        parseBtn.disabled = true;
        parseBtn.innerHTML = '<span class="loading-spinner"></span> 解析中...';

        try {
            const form = new FormData();
            form.append('file', currentFile);

            const res = await fetch(`${API_BASE}/parse`, {
                method: 'POST',
                body: form,
            });

            const data = await res.json();

            if (data.success) {
                renderParseResult(data);
                showToast('✅ 解析完成！', 'success');
            } else {
                showToast('❌ ' + (data.error || '解析失败'), 'error');
            }
        } catch (err) {
            showToast('❌ 请求失败：' + err.message, 'error');
        } finally {
            parseBtn.disabled = false;
            parseBtn.innerHTML = '🚀 开始解析';
        }
    });

    function renderParseResult(data) {
        const d = data.data;
        const fromCache = data.from_cache || false;

        parseResult.style.display = 'block';
        let html = '';

        if (fromCache) {
            html += `<div class="cache-badge">💡 命中缓存</div>`;
        }

        // 个人信息 + 技能
        html += `<div class="grid-2">`;
        html += `<div class="info-card"><h3>👤 个人信息</h3>
            <div class="item"><span class="label">姓名</span><span class="value">${d.name || '未识别'}</span></div>
            <div class="item"><span class="label">电话</span><span class="value">${d.phone || '未识别'}</span></div>
            <div class="item"><span class="label">邮箱</span><span class="value">${d.email || '未识别'}</span></div>
            <div class="item"><span class="label">地址</span><span class="value">${d.address || '未识别'}</span></div>
            <div class="item"><span class="label">学历</span><span class="value">${d.education || '未识别'}</span></div>
            <div class="item"><span class="label">求职意向</span><span class="value">${d.job_intention || '未识别'}</span></div>
            <div class="item"><span class="label">期望薪资</span><span class="value">${d.salary || '未填写'}</span></div>
            <div class="item"><span class="label">工作年限</span><span class="value">${d.work_years || '未填写'}</span></div>
        </div>`;

        html += `<div class="info-card"><h3>🛠️ 技能</h3>`;
        if (d.skills && d.skills.length) {
            d.skills.forEach(s => { html += `<span class="skill-tag">${s}</span>`; });
        } else {
            html += `<span class="text-secondary">未识别到技能关键词</span>`;
        }
        html += `</div></div>`;

        // 项目经历
        html += `<div style="margin-top:16px;"><h3 style="font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">📁 项目经历</h3>`;
        if (d.projects && d.projects.length) {
            d.projects.forEach((p, i) => {
                // 按句号分割，提升可读性
                const parts = p.replace(/[；;]/g, '。').split('。').filter(s => s.trim().length > 5);
                html += `<div class="project-item"><strong>📌 项目 ${i+1}</strong>`;
                if (parts.length) {
                    html += `<ul style="margin:4px 0 0 18px;padding:0;">`;
                    parts.forEach(s => { html += `<li>${s.trim()}</li>`; });
                    html += `</ul>`;
                } else {
                    html += `<div style="margin-top:4px;">${p}</div>`;
                }
                html += `</div>`;
            });
        } else {
            html += `<span class="text-secondary">未识别到项目经历</span>`;
        }
        html += `</div>`;

        parseResult.innerHTML = html;
    }

    // ============================================================
    //  API 调用：匹配
    // ============================================================
    matchBtn.addEventListener('click', async () => {
        if (!currentFileMatch) {
            showToast('请先选择 PDF 简历', 'error');
            return;
        }
        const jd = jdInput.value.trim();
        if (!jd || jd.length < 5) {
            showToast('岗位描述至少 5 个字符', 'error');
            return;
        }

        matchBtn.disabled = true;
        matchBtn.innerHTML = '<span class="loading-spinner"></span> 匹配中...';

        try {
            const form = new FormData();
            form.append('file', currentFileMatch);
            form.append('job_description', jd);

            const res = await fetch(`${API_BASE}/match`, {
                method: 'POST',
                body: form,
            });

            const data = await res.json();

            if (data.success) {
                renderMatchResult(data);
                showToast('✅ 匹配完成！', 'success');
            } else {
                showToast('❌ ' + (data.error || '匹配失败'), 'error');
            }
        } catch (err) {
            showToast('❌ 请求失败：' + err.message, 'error');
        } finally {
            matchBtn.disabled = false;
            matchBtn.innerHTML = '📊 计算匹配度';
        }
    });

    function renderMatchResult(data) {
        const d = data.data;
        const resume = d.resume || {};
        const match = d.match || {};
        const fromCache = data.from_cache || false;

        matchResult.style.display = 'block';
        let html = '';

        if (fromCache) {
            html += `<div class="cache-badge">💡 命中缓存</div>`;
        }

        const score = match.score || 0;

        html += `<div class="match-hero">
            <div class="score-circle">${score}%</div>
            <div class="score-detail">
                <div><strong>匹配度得分</strong> <span style="float:right;">${score}%</span></div>
                <div class="row"><span>技能匹配</span><div class="bar"><div class="fill" style="width:${match.skill_match_score || 0}%;"></div></div><span>${match.skill_match_score || 0}%</span></div>
                <div class="row"><span>经验</span><div class="bar"><div class="fill" style="width:${(match.experience_score || 0) * 5}%;"></div></div><span>${match.experience_score || 0}/20</span></div>
                <div class="row"><span>学历</span><div class="bar"><div class="fill" style="width:${(match.education_score || 0) * 6.67}%;"></div></div><span>${match.education_score || 0}/15</span></div>
                <div class="row"><span>项目</span><div class="bar"><div class="fill" style="width:${(match.project_score || 0) * 10}%;"></div></div><span>${match.project_score || 0}/10</span></div>
                <div class="row"><span>AI加分</span><div class="bar"><div class="fill" style="width:${(match.ai_bonus_score || 0) * 20}%;"></div></div><span>${match.ai_bonus_score || 0}/5</span></div>
            </div>
        </div>`;

        html += `<div class="grid-2">`;
        html += `<div class="info-card"><h3>👤 候选人</h3>
            <div class="item"><span class="label">姓名</span><span class="value">${resume.name || '未识别'}</span></div>
            <div class="item"><span class="label">学历</span><span class="value">${resume.education || '未识别'}</span></div>
            <div class="item"><span class="label">工作年限</span><span class="value">${resume.work_years || '未填写'}</span></div>
            <div class="item"><span class="label">项目数</span><span class="value">${(resume.projects || []).length}</span></div>
        </div>`;
        html += `<div class="info-card"><h3>🔗 匹配详情</h3>
            <div class="item"><span class="label">匹配技能</span><span class="value">${(match.matched_skills || []).join(', ') || '无'}</span></div>
            <div class="item"><span class="label">岗位关键词</span><span class="value">${(match.jd_keywords || []).slice(0,6).join(', ') || '无'}</span></div>
            <div class="item"><span class="label">${match.details || ''}</span></div>
        </div></div>`;

        matchResult.innerHTML = html;
    }

    // ============================================================
    //  快捷键：回车触发
    // ============================================================
    jdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            matchBtn.click();
        }
    });
</script>
</body>
</html>
